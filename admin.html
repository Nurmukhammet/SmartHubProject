<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartHub — Админка</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #CC0000;
      --blue: #1A1A8C;
      --dark: #1a1a1a;
      --bg: #f4f4f6;
      --white: #fff;
      --shadow: 0 2px 12px rgba(0,0,0,.10);
      --border: #e2e2e2;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── Login overlay ── */
    #loginOverlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
    }
    #loginOverlay.hidden { display: none; }

    .login-box {
      background: var(--white);
      border-radius: 16px;
      padding: 40px 36px;
      width: 340px;
      box-shadow: 0 8px 40px rgba(0,0,0,.22);
      text-align: center;
    }
    .login-box h2 {
      font-size: 1.4rem; font-weight: 900;
      color: var(--red); margin-bottom: 8px;
    }
    .login-box p { font-size: .88rem; color: #777; margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 12px 14px;
      border: 2px solid var(--border); border-radius: 8px;
      font-size: .95rem; font-family: inherit;
      margin-bottom: 14px; transition: border-color .2s;
    }
    .login-box input:focus { outline: none; border-color: var(--red); }
    .login-box button {
      width: 100%; padding: 12px;
      background: var(--red); color: #fff;
      border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: opacity .2s;
    }
    .login-box button:hover { opacity: .88; }
    #loginError { color: var(--red); font-size: .85rem; margin-top: 10px; min-height: 18px; }

    /* ── Header ── */
    header {
      background: var(--white);
      box-shadow: var(--shadow);
      padding: 0 40px;
      height: 72px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-area svg { width: 42px; height: 42px; }
    .logo-area .brand { font-weight: 900; font-size: 1.3rem; color: var(--dark); }
    .logo-area .sub { font-size: .7rem; color: #888; }
    .header-actions { display: flex; align-items: center; gap: 12px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 20px; border-radius: 8px;
      font-weight: 700; font-size: .9rem;
      cursor: pointer; text-decoration: none;
      border: none; transition: opacity .2s, transform .15s;
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn-red { background: var(--red); color: #fff; }
    .btn-outline {
      background: none; color: var(--dark);
      border: 2px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--red); color: var(--red); }
    .btn-danger { background: #ff4444; color: #fff; }
    .btn-sm { padding: 5px 12px; font-size: .8rem; }

    /* ── Main ── */
    main { max-width: 1200px; margin: 0 auto; padding: 36px 24px; }

    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 20px; margin-bottom: 32px;
    }
    .stat-card {
      background: var(--white); border-radius: 14px;
      padding: 24px 28px; box-shadow: var(--shadow);
    }
    .stat-card .num {
      font-size: 2.4rem; font-weight: 900;
      color: var(--red); line-height: 1;
    }
    .stat-card .label { font-size: .85rem; color: #888; margin-top: 6px; }

    .table-card {
      background: var(--white); border-radius: 14px;
      box-shadow: var(--shadow); overflow: hidden;
    }
    .table-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: 12px;
    }
    .table-top h2 { font-size: 1.1rem; font-weight: 900; color: var(--dark); }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%; border-collapse: collapse;
      font-size: .88rem;
    }
    thead th {
      background: #f8f8f9; color: #555;
      font-weight: 700; font-size: .78rem;
      text-transform: uppercase; letter-spacing: .04em;
      padding: 12px 16px; text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr { transition: background .15s; }
    tbody tr:hover { background: #fafafa; }
    tbody td {
      padding: 13px 16px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: top;
    }
    tbody td:last-child { white-space: nowrap; }
    .badge-id {
      display: inline-block; background: #f0f0f4;
      color: #888; border-radius: 5px;
      padding: 2px 8px; font-size: .78rem; font-weight: 700;
    }
    .msg-cell { max-width: 220px; color: #666; }

    #emptyRow td {
      text-align: center; padding: 48px;
      color: #bbb; font-size: 1rem;
    }

    /* ── Search ── */
    .search-input {
      padding: 8px 14px; border: 2px solid var(--border);
      border-radius: 8px; font-size: .9rem; font-family: inherit;
      transition: border-color .2s; width: 240px;
    }
    .search-input:focus { outline: none; border-color: var(--red); }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 28px; right: 28px;
      background: #222; color: #fff;
      padding: 12px 22px; border-radius: 10px;
      font-size: .9rem; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
      z-index: 9999;
    }
    #toast.show { opacity: 1; }
    #toast.ok { background: #1e8c3a; }
    #toast.err { background: var(--red); }

    @media (max-width: 700px) {
      header { padding: 0 16px; }
      main { padding: 20px 12px; }
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ══ Login ════════════════════════════════════════════ -->
<div id="loginOverlay">
  <div class="login-box">
    <svg viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:52px;height:52px;margin-bottom:14px">
      <path d="M55 8C30 8 10 28 10 53s20 45 45 45 45-20 45-45S80 8 55 8Z" fill="none" stroke="#CC0000" stroke-width="7" stroke-linecap="round"/>
      <path d="M42 35 78 53 42 71Z" fill="#CC0000"/>
    </svg>
    <h2>SmartHub Админка</h2>
    <p id="loginMode">Введите ключ доступа для входа</p>
    <input type="password" id="keyInput" placeholder="Ключ доступа" />
    <button onclick="doLogin()">Войти</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- ══ Header ═══════════════════════════════════════════ -->
<header>
  <div class="logo-area">
    <svg viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M55 8C30 8 10 28 10 53s20 45 45 45 45-20 45-45S80 8 55 8Z" fill="none" stroke="#CC0000" stroke-width="7" stroke-linecap="round"/>
      <path d="M42 35 78 53 42 71Z" fill="#CC0000"/>
    </svg>
    <div>
      <div class="brand">SmartHub</div>
      <div class="sub">Панель администратора</div>
    </div>
  </div>
  <div class="header-actions">
    <a href="index.html" class="btn btn-outline">← На сайт</a>
    <button class="btn btn-red" onclick="exportExcel()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Скачать Excel
    </button>
  </div>
</header>

<!-- ══ Main ═════════════════════════════════════════════ -->
<main>
  <!-- Статистика -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="num" id="statTotal">—</div>
      <div class="label">Всего заявок</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statToday">—</div>
      <div class="label">Заявок сегодня</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statCities">—</div>
      <div class="label">Разных городов</div>
    </div>
  </div>

  <!-- Таблица -->
  <div class="table-card">
    <div class="table-top">
      <h2>Заявки на пробный урок</h2>
      <input class="search-input" type="text" id="searchInput" placeholder="Поиск по имени, телефону..." oninput="filterTable()" />
    </div>
    <div class="table-wrap">
      <table id="submissionsTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Имя</th>
            <th>Телефон</th>
            <th>Город</th>
            <th>Страна</th>
            <th>Сообщение</th>
            <th>Дата</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr id="emptyRow"><td colspan="8">Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<div id="toast"></div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script>
  const SERVER_MODE = window.location.protocol !== 'file:';
  const CORRECT_KEY = 'smarthub2025';

  // Показываем режим на экране логина
  document.getElementById('loginMode').textContent = SERVER_MODE
    ? 'Введите ключ доступа для входа'
    : '⚠️ Режим без сервера — данные из браузера';

  let adminKey = '';
  let allRows = [];

  // ── Login ─────────────────────────────────────────────
  function doLogin() {
    const val = document.getElementById('keyInput').value.trim();
    if (!val) return;

    if (SERVER_MODE) {
      adminKey = val;
      fetchSubmissions().then(ok => {
        if (ok) {
          document.getElementById('loginOverlay').classList.add('hidden');
        } else {
          document.getElementById('loginError').textContent = 'Неверный ключ доступа';
          adminKey = '';
        }
      });
    } else {
      // Без сервера — проверяем ключ локально
      if (val === CORRECT_KEY) {
        adminKey = val;
        document.getElementById('loginOverlay').classList.add('hidden');
        loadLocalSubmissions();
      } else {
        document.getElementById('loginError').textContent = 'Неверный ключ доступа';
      }
    }
  }

  document.getElementById('keyInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // ── Загрузка из localStorage (режим без сервера) ──────
  function loadLocalSubmissions() {
    allRows = JSON.parse(localStorage.getItem('sh_submissions') || '[]');
    renderTable(allRows);
    renderStats(allRows);
    showToast('Режим без сервера — данные из браузера', '');
  }

  // ── Загрузка с сервера ────────────────────────────────
  async function fetchSubmissions() {
    try {
      const res = await fetch(`/api/submissions?key=${adminKey}`);
      if (!res.ok) return false;
      allRows = await res.json();
      renderTable(allRows);
      renderStats(allRows);
      return true;
    } catch {
      // Сервер недоступен — подгружаем из localStorage
      allRows = JSON.parse(localStorage.getItem('sh_submissions') || '[]');
      renderTable(allRows);
      renderStats(allRows);
      showToast('Сервер недоступен — показаны локальные данные', '');
      return true;
    }
  }

  // ── Render таблицы ────────────────────────────────────
  function renderTable(rows) {
    const tbody = document.getElementById('tableBody');
    if (!rows.length) {
      tbody.innerHTML = '<tr id="emptyRow"><td colspan="8">Заявок пока нет</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(r => `
      <tr data-id="${r.id}">
        <td><span class="badge-id">${r.id}</span></td>
        <td><strong>${esc(r.name)}</strong></td>
        <td>${esc(r.phone)}</td>
        <td>${esc(r.city) || '<span style="color:#bbb">—</span>'}</td>
        <td>${esc(r.country) || '<span style="color:#bbb">—</span>'}</td>
        <td class="msg-cell">${esc(r.message) || '<span style="color:#bbb">—</span>'}</td>
        <td style="color:#888;font-size:.82rem">${esc(r.created_at) || '—'}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="deleteRow(${r.id})">Удалить</button>
        </td>
      </tr>
    `).join('');
  }

  function renderStats(rows) {
    document.getElementById('statTotal').textContent = rows.length;
    const today = new Date().toLocaleDateString('ru-RU');
    const todayCount = rows.filter(r => r.created_at && r.created_at.includes(today)).length;
    document.getElementById('statToday').textContent = todayCount;
    const cities = new Set(rows.map(r => r.city).filter(Boolean));
    document.getElementById('statCities').textContent = cities.size || 0;
  }

  // ── Поиск ─────────────────────────────────────────────
  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allRows.filter(r =>
      r.name.toLowerCase().includes(q) ||
      r.phone.toLowerCase().includes(q) ||
      (r.city || '').toLowerCase().includes(q) ||
      (r.country || '').toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  // ── Удаление ──────────────────────────────────────────
  async function deleteRow(id) {
    if (!confirm('Удалить заявку #' + id + '?')) return;

    if (SERVER_MODE && adminKey) {
      try {
        const res = await fetch(`/api/submissions/${id}?key=${adminKey}`, { method: 'DELETE' });
        if (!res.ok) throw new Error();
      } catch { /* если сервер недоступен — всё равно удаляем локально */ }
    }

    // Удаляем и из localStorage
    const local = JSON.parse(localStorage.getItem('sh_submissions') || '[]');
    localStorage.setItem('sh_submissions', JSON.stringify(local.filter(r => r.id != id)));

    allRows = allRows.filter(r => r.id != id);
    renderTable(allRows);
    renderStats(allRows);
    showToast('Заявка удалена', 'ok');
  }

  // ── Экспорт в Excel (работает без сервера) ────────────
  function exportExcel() {
    if (SERVER_MODE && adminKey) {
      // Если сервер есть — скачиваем через API
      window.location.href = `/api/export?key=${adminKey}`;
      return;
    }
    // Без сервера — генерируем Excel прямо в браузере через SheetJS
    const data = allRows.map(r => ({
      'ID':        r.id,
      'Имя':       r.name,
      'Телефон':   r.phone,
      'Город':     r.city || '',
      'Страна':    r.country || '',
      'Сообщение': r.message || '',
      'Дата':      r.created_at || '',
    }));
    const ws = XLSX.utils.json_to_sheet(data.length ? data : [{}]);
    ws['!cols'] = [{wch:6},{wch:22},{wch:18},{wch:16},{wch:16},{wch:40},{wch:22}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Заявки SmartHub');
    XLSX.writeFile(wb, 'smarthub-zayavki.xlsx');
  }

  // ── Helpers ───────────────────────────────────────────
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + (type || '');
    setTimeout(() => t.className = '', 3000);
  }

  // Обновлять каждые 30 сек если сервер доступен
  setInterval(() => {
    if (adminKey && SERVER_MODE) fetchSubmissions();
  }, 30000);

  // Обновлять каждые 30 секунд
  setInterval(() => {
    if (adminKey) fetchSubmissions();
  }, 30000);
</script>
</body>
</html>
